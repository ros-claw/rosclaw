# UR5e Benchmark Configuration — Physical DNA Benchmark Layer
# For Darwin / EEIB evaluation and regression testing

benchmark_version: "1.0"
robot_id: universal_robots_ur5e

# ── Kinematic Benchmarks ──
kinematic_benchmarks:
  - name: ik_solve_rate
    description: "Success rate of analytical IK solutions"
    target: 0.999
    timeout_ms: 5.0
  - name: fk_accuracy
    description: "Forward kinematics accuracy vs CAD"
    target: 1.0e-6
    unit: m
  - name: singularity_avoidance
    description: "Avoid kinematic singularities during motion"
    target: 0.95

# ── Dynamic Benchmarks ──
dynamic_benchmarks:
  - name: trajectory_tracking_error
    description: "RMSE of joint position tracking"
    target: 0.001
    unit: rad
    test_trajectories:
      - name: slow_pick
        duration: 5.0
        max_speed: 0.5
      - name: fast_pick
        duration: 2.0
        max_speed: 2.0
  - name: settling_time
    description: "Time to settle within 0.1% of target"
    target: 0.05
    unit: s
  - name: force_control_bandwidth
    description: "Force control loop bandwidth"
    target: 50.0
    unit: Hz

# ── Simulation Benchmarks ──
simulation_benchmarks:
  mujoco:
    - name: real_time_factor
      target: 1.0
      tolerance: 0.05
    - name: contact_stability
      description: "No contact-related instabilities in 60s simulation"
      target: true
    - name: energy_conservation
      description: "Total energy drift in free-fall test"
      target: 0.01
      unit: J

  isaac:
    - name: real_time_factor
      target: 1.0
      tolerance: 0.1
    - name: gpu_physics_speedup
      target: 10.0
      description: "Speedup vs CPU physics for 1000 parallel envs"

# ── Task Benchmarks (Darwin-style) ──
task_benchmarks:
  - name: tabletop_pick_10
    description: "Pick 10 objects from a table"
    tasks:
      - pick_and_place
    objects:
      - class: red_cup
        mass: 0.1
        shape: cylinder
      - class: blue_box
        mass: 0.5
        shape: box
    layout: random
    metrics:
      - name: success_rate
        target: 0.95
      - name: avg_cycle_time
        target: 10.0
        unit: s
      - name: collision_count
        target: 0

  - name: peg_in_hole_5
    description: "Insert 5 pegs into holes with force compliance"
    tasks:
      - force_compliant_insert
    tolerance:
      position: 0.001
      orientation: 0.05
    metrics:
      - name: success_rate
        target: 0.90
      - name: avg_force
        target: 30.0
        unit: N
        max: 50.0

  - name: push_to_zone_10
    description: "Push 10 objects to target zones"
    tasks:
      - push
    metrics:
      - name: success_rate
        target: 0.90
      - name: position_error
        target: 0.02
        unit: m

# ── Safety Benchmarks ──
safety_benchmarks:
  - name: pfl_response_time
    description: "Power and Force Limiting response time"
    target: 4.0
    unit: ms
  - name: protective_stop_latency
    description: "Time from trigger to full stop"
    target: 250.0
    unit: ms
  - name: collision_force_at_stop
    description: "Measured contact force when stop triggers"
    target: 150.0
    unit: N
    max: 200.0

# ── Baseline Hardware ──
baseline_hardware:
  cpu: "Intel i7-12700"
  gpu: "NVIDIA RTX 3080"
  ram: "32GB DDR4"
  os: "Ubuntu 22.04"
  ros_distro: "humble"
  realtime_kernel: false
