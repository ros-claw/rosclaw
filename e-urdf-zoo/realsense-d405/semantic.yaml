robot_id: realsense_d405
semantic_version: "1.0"

functional_regions:
  - name: close_range_field_of_view
    frame: d405_color_optical_frame
    type: frustum
    range_m:
      min: 0.07
      max: 0.50
    description: >
      Primary close-range sensing volume for tabletop / manipulation inspection.

visual_features:
  - name: rgb_optical_center
    frame: d405_color_optical_frame
    description: Center of the color camera optical axis.
  - name: depth_optical_center
    frame: d405_depth_optical_frame
    description: Center of the depth camera optical axis.

task_descriptions:
  close_range_rgbd_scene_scan: >
    Capture RGB-D frames from the D405 close-range camera and reason about
    objects and physical risks within 7–50 cm.
  tabletop_perception: >
    Use D405 to inspect a tabletop workspace for objects, obstacles, and risks.

semantic_tags:
  - perception_only
  - close_range
  - tabletop
  - rgbd
  - no_actuation
