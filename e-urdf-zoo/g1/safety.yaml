pfl:
  enabled: true
  max_tcp_force: 100.0
  max_tcp_torque: 5.0
  max_static_force: 30.0
  max_pressure: 100.0
  max_speed_tool: 0.5
  max_speed_joint: 3.14
collision_detection:
  method: force_threshold
  threshold_force: 30.0
  threshold_torque: 2.0
  reaction_time_ms: 5.0
  reaction_strategy: stop_and_retract
  retraction_distance: 0.05
emergency_stop:
  category: 3
  stop_time_ms: 200.0
  stop_distance_m: 0.5
  dual_channel: true
workspace_boundaries:
  type: enclosure
  fenceless: false
  virtual_boundaries:
  - name: front_plane
    type: plane
    normal: [0, 1, 0]
    offset: -1.0
  - name: top_plane
    type: plane
    normal: [0, 0, -1]
    offset: 2.0
interaction:
  hand_guiding: false
  speed_slider_max: 0.5
  force_guiding_max: 5.0
  protective_stop_on_contact: true
environment:
  ambient_temp_min: -10.0
  ambient_temp_max: 45.0
  humidity_max: 85.0
  ip_rating: IP54
  cleanroom_class: ISO 7
safety_limits:
