# RH56 right hand — RS485/Modbus-RTU transport profile (6 actuators, 0-1000 raw).
#
# This is the ONLY valid profile for the /dev/ttyUSB0 RS485 connection used by
# the ROSClaw RH56 examples.  The CAN 2.0B interface (11 joints, 0-65535) is a
# different protocol and must use rh56_can_v1 instead.
schema_version: rosclaw.rh56.transport_profile.v1

id: rh56_right_rs485_v1

transport:
  type: serial_modbus_rtu
  device: /dev/ttyUSB0
  baudrate: 115200
  slave_id: 2

command:
  actuator_count: 6
  position_range: [0, 1000]
  position_convention:
    closed: 0
    open: 1000
  speed_range: [0, 1000]
  force_range: [0, 1000]
  force_unit: gram
  current_unit: milliampere

action_order:
  - little
  - ring
  - middle
  - index
  - thumb
  - thumb_rot

feedback:
  position_unit: raw_device_unit
  force_channel: FORCE_ACT     # stable contact signal
  current_channel: CURRENT     # motion/stall auxiliary signal (returns ~0 at rest)
  status_channel: STATUS       # protection hard criterion
  temperature_channel: TEMP    # thermal hard criterion
  # Register widths MEASURED on this unit (Exp 0 readonly probe,
  # /tmp/rh56_exp0_readonly.json): right hand is 6/6 per-DOF registers
  # (the LEFT hand is 3/3 grouped — never share defaults between hands).
  status_registers: 6
  temperature_registers: 6

metadata:
  provider_ref: inspire_rh56_serial
  hand: right
  source: rosclaw_rps example convention
