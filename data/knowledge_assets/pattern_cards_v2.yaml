- id: compiled_aes_constant_time_compare
  domain: Systems_Compute
  task_families:
  - cryptographic_optimization
  embodiment_types:
  - gpu_kernel
  artifact_languages:
  - cpp
  priority: 0
  symptom: memcmp-style tag verification stops at the first mismatch, letting an attacker
    recover the tag one byte at a time.
  diagnosis: 'Likely cause(s):

    - tag comparison via stock memcmp / standard equality

    - no constant-time helper imported


    Default ``memcmp``-style equality stops at the first mismatching byte; that lets
    an attacker recover MAC tags one byte at a time.  Successful runs swap to a fixed-time
    comparison routine that XORs every byte.'
  preconditions:
  - 'Observable signal: verifier flags constant-time compare regression'
  - 'Observable signal: byte-by-byte wall-clock differential on injected mismatches'
  next_experiment: '- Replaced early-exit memcmp with a constant-time comparison helper.'
  code_target: The whole editable artifact is the patch site.
  patch_sketch: _(no patch shape inferred — see Next Experiment)_
  expected_verifier_signals:
  - verifier's tag-validation tests still pass; timing test (if any) reports flat
    wall-clock independent of mismatch position.
  anti_patterns:
  - do not roll your own constant-time compare — use the vetted helper
  contraindications:
  - do not roll your own constant-time compare — use the vetted helper
  cross_domain_analogy: ''
