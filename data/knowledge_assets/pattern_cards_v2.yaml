- id: compiled_aes_branchless_select
  domain: Systems_Compute
  task_families:
  - cryptographic_optimization
  embodiment_types:
  - gpu_kernel
  artifact_languages:
  - cpp
  priority: 0
  symptom: Secret-dependent conditional moves leak whether the key bit was 0 or 1
    via branch-predictor state.
  diagnosis: 'Likely cause(s):

    - ternary / if-else on a secret value in the hot path

    - no branchless lowering of conditional ops


    Conditional moves and ``a if cond else b`` ternaries leak whether the secret key
    bit was 0 or 1 via branch-predictor state.  Successful runs convert secret-dependent
    branches into bitmask-driven branchless selects.'
  preconditions:
  - 'Observable signal: wall-clock differs measurably with key value'
  - 'Observable signal: timing-side-channel test in the verifier fails'
  next_experiment: '- Introduced a branchless / constant-time select in place of an
    if-branch.'
  code_target: The whole editable artifact is the patch site.
  patch_sketch: _(no patch shape inferred — see Next Experiment)_
  expected_verifier_signals:
  - timing-side-channel test in the verifier (when present) stops flagging correlated
    wall-clock per key bit.
  anti_patterns:
  - branchless rewrites on every comparison can hurt non-secret-dependent paths
  contraindications:
  - branchless selects on every comparison can hurt throughput on hot paths that are
    *not* secret-dependent — apply selectively.
  - branchless rewrites on every comparison can hurt non-secret-dependent paths
  cross_domain_analogy: ''
  source_quality: A
