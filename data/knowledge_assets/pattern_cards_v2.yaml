  priority: 0
  symptom: Actuator saturates while integral term keeps accumulating; recovery after
    setpoint change is slow.
  diagnosis: 'Likely cause(s):

    - unconditional integration during saturation

    - missing back-calculation term

    - integral gain too high for current actuator range


    When an actuator output is at saturation, allowing the integral term to keep accumulating
    produces windup.  Successful PID-tuning runs disable the integral channel entirely
    for axes where the actuator is regularly saturated.'
  preconditions:
  - 'Observable signal: actuator output clipped to limit for many control steps'
  - 'Observable signal: overshoot grows after error persists'
  - 'Observable signal: settling time blows up after setpoint reversal'
  - 'Symbols present in the editable artifact: `Ki_theta`, `Ki_x`, `Ki_z`'
  next_experiment: '- Set the named parameter(s) to zero: set parameter to zero on
    Ki_theta; set parameter to zero on Ki_x; set parameter to zero on Ki_z.'
