- id: compiled_controller_output_clamp
  domain: Control_Locomotion
  task_families:
  - robotics_optimization
  embodiment_types:
  - uav
  - manipulator
  - wheeled_robot
  - quadruped
  artifact_languages:
  - python
  - cpp
  priority: 0
  symptom: Final controller command is not bounded before it reaches the actuator
    interface.
  diagnosis: 'Likely cause(s):

    - clamp removed during debugging

    - feed-forward path bypasses clamp


    Successful runs explicitly clamp the controller command to the actuator''s physical
    range before it leaves the control function.  Relying on downstream code to clip
    is a frequent source of saturation-induced instability.'
  preconditions:
  - 'Observable signal: command magnitude tracks raw PID output'
  - 'Observable signal: actuator saturation flag never set by driver'
  - 'Symbols present in the editable artifact: `T_cmd`, `desired_pitch`'
  next_experiment: '- Clamp the controller output before it leaves the function: added
    output clamp on desired_pitch; added output clamp on T_cmd.'
  code_target: 'Search the editable artifact for these identifiers and treat their
    definitions as the patch site: `T_cmd`, `desired_pitch`.'
  patch_sketch: '```python

    # Clamp the controller output BEFORE the actuator-lag filter.

    out = max(min_value, min(max_value, out))

    # or numpy:

    out = np.clip(out, -bound, bound)

    ```'
  expected_verifier_signals:
  - feasibility stays valid even on aggressive maneuvers; thrust / torque never exceeds
    its bound.
  anti_patterns:
  - do not implement clamp inside the integrator step — keep it on the output
  contraindications:
  - clamps must be applied *before* the actuator-lag filter, not after, or the command
    will spike at the next sample
  - do not implement clamp inside the integrator step — keep it on the output
  cross_domain_analogy: ''
  source_quality: A
  source_ids:
