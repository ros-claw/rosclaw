  priority: 0
  symptom: A structured optimizer with no wall-clock guard can run past the evaluator
    timeout and lose the run entirely.
  diagnosis: A structured optimizer with no wall-clock guard can run past the evaluator
    timeout and lose the run entirely.  Successful entries gate their search on ``time.time()
    < deadline``.
  preconditions:
  - The candidate artifact compiles and runs without errors on the baseline evaluator.
  next_experiment: '- Gate the search loop on a wall-clock deadline: added wall-clock
    time budget guard.'
  code_target: Locate every `while` / `for` loop that controls the search iteration
    budget; treat its guard expression as the patch site.
  patch_sketch: "```python\nimport time\nDEADLINE = time.time() + WALLCLOCK_BUDGET\n\
    while time.time() < DEADLINE:\n    ...   # search step\n```"
  expected_verifier_signals:
  - evaluator returncode stays 0 even when the search explores deep alternatives.
  anti_patterns:
  - Do not embed concrete tuning values from another task's baseline archive — see
    plan §3.5.
  contraindications: []
  cross_domain_analogy: '**Systems_Compute**: same shape as a request timeout in an
    RPC client — gate the inner loop on a wall-clock deadline, fail soft when it elapses.'
