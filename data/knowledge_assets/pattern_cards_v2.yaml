    definitions as the patch site: `Ki_theta`, `Ki_x`, `Ki_z`.'
  patch_sketch: '```python

    # Zero out the named parameter(s) in your candidate dict.

    # Example shape (replace identifier with the one in your code):

    best_gains["<param>"] = 0.0   # was nonzero in baseline

    ```'
  expected_verifier_signals:
  - feasibility stays valid, overshoot decreases, settling time after setpoint changes
    goes down.
  anti_patterns:
  - do not simply increase Ki when output is already saturated
  - do not remove the output limiter
  contraindications:
  - do not raise Ki to compensate — the integrator will wind up again on the next
    saturation event
  - do not simply increase Ki when output is already saturated
  - do not remove the output limiter
