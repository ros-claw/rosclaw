- id: compiled_aes_unroll_round_structure
  domain: Systems_Compute
  task_families:
  - cryptographic_optimization
  embodiment_types:
  - gpu_kernel
  artifact_languages:
  - cpp
  priority: 0
  symptom: Loop over 10 AES rounds keeps a counter live and exposes a predictable
    but non-free branch each iteration.
  diagnosis: 'Likely cause(s):

    - rounds expressed as a Python / C++ ``for`` loop

    - no #pragma unroll on the inner loop


    Looping over the 10 AES rounds keeps a loop counter live in a register and exposes
    a predictable but non-free branch.  Top entries hard-unroll the round schedule
    (or add ``#pragma unroll``) so the rounds fuse with surrounding arithmetic.'
  preconditions:
  - 'Observable signal: profiler reports BR_MISP_RETIRED inside the round function'
  - 'Observable signal: per-block throughput plateaus despite cache hits'
  next_experiment: '- Manually unrolled round structure (symbol count rose above baseline).'
  code_target: The whole editable artifact is the patch site.
  patch_sketch: _(no patch shape inferred — see Next Experiment)_
  expected_verifier_signals:
  - throughput per block goes up without losing correctness on test vectors.
  anti_patterns:
  - do not unroll past the I-cache size on small cores
  contraindications:
  - manual unrolling can blow the I-cache on smaller cores; prefer the pragma form
    when available.
  - do not unroll past the I-cache size on small cores
  cross_domain_analogy: ''
  source_quality: B
