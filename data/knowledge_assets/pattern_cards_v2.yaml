- id: compiled_aes_use_precomputed_tables
  domain: Systems_Compute
  task_families:
  - cryptographic_optimization
  embodiment_types:
  - gpu_kernel
  artifact_languages:
  - cpp
  priority: 0
  symptom: Per-byte AES (sbox + shift + mix as separate ops) is dominated by byte
    arithmetic; throughput well below memory bandwidth.
  diagnosis: 'Likely cause(s):

    - sbox and mix-columns implemented as discrete byte ops

    - no T-table consolidation


    Per-byte AES (sbox lookup → shift rows → mix columns in separate stages) is dominated
    by byte-level arithmetic overhead.  Top runs precompute T-tables (or merge sbox+mixcol
    into one 32-bit lookup) so each round becomes four XORed table loads.'
  preconditions:
  - 'Observable signal: throughput stays well below the CPU-memory ceiling'
  - 'Observable signal: profiler shows arithmetic-unit saturation'
  - 'Symbols present in the editable artifact: `rcon`, `sbox`, `te0`, `te1`'
  next_experiment: '- Added lookup table rcon.

    - Added lookup table sbox.

    - Added lookup table te0.

    - Added lookup table te1.'
  code_target: 'Search the editable artifact for these identifiers and treat their
    definitions as the patch site: `rcon`, `sbox`, `te0`, `te1`.'
  patch_sketch: _(no patch shape inferred — see Next Experiment)_
  expected_verifier_signals:
  - throughput rises; verifier reports correct ciphertext for every test vector at
    higher MB/s.
  anti_patterns:
  - do not just inline more — the win comes from merging ops, not unrolling them
  contraindications:
  - do not embed the actual sbox bytes into the pattern — ship the *structural* recommendation
    ("add a 256-entry lookup table indexed by state byte"), not the bytes themselves
    (plan §3.5).
  - T-tables increase code size and instruction cache pressure — verify on the target
    machine before adopting.
  - do not just inline more — the win comes from merging ops, not unrolling them
  cross_domain_analogy: ''
