  priority: 0
  symptom: Successful runs insert finiteness / range checks at the boundary of their
    solver so a NaN or invalid output is caught before the evaluator returns 'infeasible'.
  diagnosis: Successful runs insert finiteness / range checks at the boundary of their
    solver so a NaN or invalid output is caught before the evaluator returns 'infeasible'.  Catches
    a large fraction of soft failures in Frontier-Eng's pure-Python tasks.
  preconditions:
  - The candidate artifact compiles and runs without errors on the baseline evaluator.
  next_experiment: '- Add a finiteness / range check at the boundary: added boundary
    / finiteness check on intermediate value.'
  code_target: The whole editable artifact is the patch site.
  patch_sketch: "```python\n# Finiteness + range guard at the function boundary.\n\
    if not np.all(np.isfinite(out)):\n    raise ValueError(\"non-finite output\")\n\
    out = np.clip(out, lo, hi)\n```"
  expected_verifier_signals:
  - feasibility rate stays high even on novel candidate configurations.
  anti_patterns:
  - Do not embed concrete tuning values from another task's baseline archive — see
    plan §3.5.
  contraindications: []
  cross_domain_analogy: ''
