- id: candidate_aes_use_precomputed_tables
  task_family: cryptographic_optimization
  failure_id: failure_aes_byte_op_overhead
  diagnosis: Per-byte AES (sbox lookup → shift rows → mix columns in separate stages) is dominated by byte-level arithmetic
    overhead.  Top runs precompute T-tables (or merge sbox+mixcol into one 32-bit lookup) so each round becomes four XORed
    table loads.
  successful_mutations:
  - kind: add_lookup_table
    description: added lookup table rcon
    target_identifier: rcon
    score_delta: null
    schema_version: '2.0'
  - kind: add_lookup_table
    description: added lookup table sbox
    target_identifier: sbox
    score_delta: null
    schema_version: '2.0'
  - kind: add_lookup_table
    description: added lookup table te0
    target_identifier: te0
    score_delta: null
    schema_version: '2.0'
  - kind: add_lookup_table
    description: added lookup table te1
    target_identifier: te1
    score_delta: null
    schema_version: '2.0'
  failed_mutations: []
  expected_verifier_signal: throughput rises; verifier reports correct ciphertext for every test vector at higher MB/s.
  contraindications:
  - do not embed the actual sbox bytes into the pattern — ship the *structural* recommendation ("add a 256-entry lookup table
    indexed by state byte"), not the bytes themselves (plan §3.5).
  - T-tables increase code size and instruction cache pressure — verify on the target machine before adopting.
  evidence_count: 1
  avg_score_delta: null
