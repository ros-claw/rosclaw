- id: candidate_cuda_async_global_to_shared_copy
  task_family: kernel_engineering_optimization
  failure_id: failure_cuda_blocking_load
  diagnosis: Loading inputs with a synchronous ``ldg`` / ``__ldcs`` stall-the-warp pattern leaves the compute units idle.  Successful
    runs schedule the next tile's load via ``cp.async`` / ``tl.async_copy`` so the current tile's MMAs run concurrently.
  successful_mutations:
  - kind: add_async_copy
    description: introduced asynchronous global→shared copies to overlap load with compute
    target_identifier: null
    score_delta: null
    schema_version: '2.0'
  failed_mutations: []
  expected_verifier_signal: Nsight reports the load stage and compute stage overlapping; total kernel time drops.
  contraindications:
  - async copies require careful ``cp.async.wait_group`` fences — missing fences are a correctness bug, not a perf bug.
  evidence_count: 1
  avg_score_delta: null
  source_trajectory_ids:
  - synthetic__flashattention
  schema_version: '2.0'
- id: candidate_cuda_shared_memory_tiling
  task_family: kernel_engineering_optimization
  failure_id: failure_cuda_global_memory_bound
  diagnosis: When the same input element is read by multiple threads (e.g. K in attention, A row in matmul), leaving it in
    global memory dominates the kernel time.  Top entries stage the reused tiles into shared memory (or Triton's ``tl.load``
    + tile loop) before the inner reduction.
  successful_mutations:
  - kind: add_shared_memory_tile
    description: promoted reused inputs into shared-memory tiles before the inner reduction
    target_identifier: null
    score_delta: null
    schema_version: '2.0'
  failed_mutations: []
  expected_verifier_signal: tokens-per-sec or GB/s climbs; correctness vs reference kernel stays within tolerance.
  contraindications:
  - shared memory is a scarce resource — over-tiling forces low occupancy and may regress.  Tile size must respect ``cudaDeviceGetAttribute(maxSharedMemoryPerBlock)``.
  - tile boundaries must guard against masked / partial loads or you'll silently read garbage on the edge.
  evidence_count: 2
  avg_score_delta: null
  source_trajectory_ids:
