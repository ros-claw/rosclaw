- id: candidate_aes_unroll_round_structure
  task_family: cryptographic_optimization
  failure_id: failure_aes_branch_mispredict
  diagnosis: Looping over the 10 AES rounds keeps a loop counter live in a register and exposes a predictable but non-free
    branch.  Top entries hard-unroll the round schedule (or add ``#pragma unroll``) so the rounds fuse with surrounding arithmetic.
  successful_mutations:
  - kind: unroll_loop
    description: manually unrolled round structure (symbol count rose above baseline)
    target_identifier: null
    score_delta: null
    schema_version: '2.0'
  failed_mutations: []
  expected_verifier_signal: throughput per block goes up without losing correctness on test vectors.
  contraindications:
  - manual unrolling can blow the I-cache on smaller cores; prefer the pragma form when available.
  evidence_count: 4
  avg_score_delta: null
