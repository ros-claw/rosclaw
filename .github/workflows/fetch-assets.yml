name: Fetch Knowledge Assets

# Pulls the latest `rosclaw-know` release's `knowledge_assets-*.tar.gz`
# bundle into `data/knowledge_assets/` and opens a PR with the diff.
#
# Trigger options:
#   - Manual via `workflow_dispatch` (default).
#   - Optional cron (commented out below) for nightly refresh.
#   - On-demand by other workflows via `workflow_call`.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'rosclaw-know release tag (e.g. v1.5.0). Empty = latest non-prerelease.'
        required: false
        default: ''
      include_prerelease:
        description: 'Allow alpha/beta/rc tags when picking latest.'
        type: boolean
        default: false
  workflow_call: {}
  # schedule:
  #   - cron: '0 6 * * 1'  # Mondays 06:00 UTC — uncomment to enable nightly

jobs:
  fetch:
    name: Pull and stage assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Determine release tag
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.release_tag }}
          ALLOW_PRE: ${{ inputs.include_prerelease }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG}" ]; then
            TAG="${INPUT_TAG}"
          else
            FILTER='.[] | select(.draft==false)'
            if [ "${ALLOW_PRE}" != "true" ]; then
              FILTER="${FILTER} | select(.prerelease==false)"
            fi
            TAG=$(gh api repos/ros-claw/rosclaw-know/releases --paginate \
              | jq -r "${FILTER} | .tag_name" \
              | head -1)
          fi
          if [ -z "${TAG}" ] || [ "${TAG}" = "null" ]; then
            echo "No matching release found"
            exit 1
          fi
          echo "Using tag: ${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download asset bundle
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.pick.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/ka
          BUNDLE="knowledge_assets-${TAG}.tar.gz"
          gh release download "${TAG}" \
            --repo ros-claw/rosclaw-know \
            --pattern "${BUNDLE}" \
            --dir /tmp/ka
          test -f "/tmp/ka/${BUNDLE}"
          ls -la /tmp/ka/

      - name: Stage assets into data/knowledge_assets/
        env:
          TAG: ${{ steps.pick.outputs.tag }}
        run: |
          set -euo pipefail
          BUNDLE="knowledge_assets-${TAG}.tar.gz"
          STAGE=$(mktemp -d)
          tar -xzf "/tmp/ka/${BUNDLE}" -C "${STAGE}"
          # The bundle is `assets/`; rename to `knowledge_assets/`.
          mkdir -p data/knowledge_assets
          rsync -a --delete "${STAGE}/assets/" data/knowledge_assets/
          # Record provenance.
          echo "${TAG}" > data/knowledge_assets/.source_tag
          echo "Updated $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> data/knowledge_assets/.source_tag

      - name: Compute diff
        id: diff
        run: |
          if git diff --quiet --exit-code data/knowledge_assets/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat data/knowledge_assets/ | head -40
          fi

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          branch: chore/fetch-knowledge-assets-${{ steps.pick.outputs.tag }}
          commit-message: |
            chore: refresh data/knowledge_assets/ from rosclaw-know@${{ steps.pick.outputs.tag }}
          title: "chore: refresh knowledge_assets from rosclaw-know@${{ steps.pick.outputs.tag }}"
          body: |
            Auto-generated by `.github/workflows/fetch-assets.yml`.

            Source: [rosclaw-know@${{ steps.pick.outputs.tag }}](https://github.com/ros-claw/rosclaw-know/releases/tag/${{ steps.pick.outputs.tag }})

            ## Sanity

            - [ ] `bridge_index.json` parses (versioned `v2`)
            - [ ] `physical_graph.json` parses; no missing FailureMode refs
            - [ ] `pytest tests/test_know_v15_integration.py` green
            - [ ] No accidental deletion of curated baseline assets
          labels: |
            knowledge
            assets-refresh
            automated
