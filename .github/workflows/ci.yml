name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Run ruff check
        run: ruff check src tests

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Run focused mypy
        run: >-
          mypy --config-file .github/mypy-ci.ini
          src/rosclaw/kernel
          src/rosclaw/sandbox
          src/rosclaw/runtime/doctor_levels.py
          src/rosclaw/provider/core
          src/rosclaw/mcp_drivers
          src/rosclaw/mcp/adapters
          src/rosclaw/mcp/onboarding
          src/rosclaw/agent
          src/rosclaw/agent_runtime/mcp_hub.py
          src/rosclaw/integrations/lerobot/execution
          src/rosclaw/integrations/lerobot/rollout/rh56_execute.py
          src/rosclaw/integrations/lerobot/rollout/rh56_shadow.py
          src/rosclaw/connectors/ros/provider/ros_capability_provider.py
          src/rosclaw/connectors/ros/mcp/tools.py
          src/rosclaw/core/runtime.py
          src/rosclaw/cli.py
          src/rosclaw/body
          src/rosclaw/firstboot
          src/rosclaw/hub

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Run tests
        run: >-
          pytest
          tests/agent
          tests/mcp
          tests/kernel
          tests/sandbox/test_reach_episode.py
          tests/runtime/test_doctor_levels.py
          tests/provider
          tests/security
          tests/practice
          tests/body
          tests/test_mcp_drivers.py
          tests/test_mcp_drivers_coverage.py
          tests/test_mujoco_driver.py
          tests/test_firstboot.py
          tests/test_firstboot_config.py
          tests/test_config_profile.py
          tests/test_doctor_json.py
          tests/test_cli.py
          tests/test_skill_manager.py
          tests/test_skill_metadata.py
          -m 'not integration and not deployment'
          -v
          --cov=src/rosclaw
          --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  full-regression:
    name: Full Regression (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Run full non-deployment suite
        run: pytest -q

  hub-test:
    name: Hub Tests
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Run Hub tests
        run: pytest tests/hub -v

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, full-regression]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Run integration tests
        run: python scripts/integration_test.py

  deployment-test:
    name: ROS Docker Deployment Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Run ROS deployment smoke test
        run: pytest tests/connectors/ros/integration/test_ros2_container_smoke.py -v -m deployment

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, full-regression]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: pip install hatch

      - name: Build package
        run: hatch build

      - name: Verify wheel runtime resources
        run: |
          python - <<'PY'
          import glob
          import zipfile

          wheels = glob.glob("dist/*.whl")
          assert len(wheels) == 1, wheels
          with zipfile.ZipFile(wheels[0]) as wheel:
              names = set(wheel.namelist())
          required = {
              "rosclaw/kernel/action_gateway.py",
              "rosclaw/runtime/doctor_levels.py",
              "rosclaw/sandbox/episode.py",
              "rosclaw/eurdf_zoo_data/ur5e/robot.mjcf.xml",
              "rosclaw/rh56_data/configs/rh56_right_rs485_v1.yaml",
              "rosclaw/rh56_data/configs/rh56_right_01_calibration.yaml",
              "rosclaw/rh56_data/policies/rh56_reference_policy_v1/config.json",
              "rosclaw/rh56_data/policies/rh56_reference_policy_v1/model.safetensors",
              "lerobot_policy_rosclaw_rh56/__init__.py",
          }
          missing = sorted(required - names)
          assert not missing, f"wheel missing runtime resources: {missing}"
          meshes = [
              name
              for name in names
              if name.startswith("rosclaw/eurdf_zoo_data/ur5e/assets/")
              and name.endswith(".obj")
          ]
          assert len(meshes) >= 20, f"wheel contains only {len(meshes)} UR5e meshes"
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    name: Release to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/rosclaw
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
