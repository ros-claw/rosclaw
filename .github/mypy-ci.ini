[mypy]
python_version = 3.11
ignore_missing_imports = True
follow_imports = skip
# The project-wide mypy config is strict; this focused gate only checks the
# modules touched by the P0 MCP work while ignoring pre-existing noisy errors
# in the large Runtime module that are unrelated to the MCP facade.
disable_error_code = no-redef, union-attr, dict-item
