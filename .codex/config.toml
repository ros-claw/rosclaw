# ROSCLAW-MANAGED-BEGIN
# Project-scoped ROSClaw MCP configuration for trusted Codex workspaces.
[mcp_servers.rosclaw]
command = "/code/rosclaw/rosclaw_lerobot/rosclaw_repo/.venv/bin/python"
args = ["-m", "rosclaw.entrypoint", "mcp", "serve", "--project", ".", "--log-level", "ERROR"]
env_vars = ["ROSCLAW_HOME", "ROSCLAW_PROFILE", "ROSCLAW_LOG_LEVEL"]
enabled = true
required = false
startup_timeout_sec = 30.0
tool_timeout_sec = 300.0
default_tools_approval_mode = "approve"
enabled_tools = [
  "get_robot_state",
  "list_skills",
  "query_memory",
  "validate_trajectory",
  "sandbox_run",
  "practice_query",
  "emergency_stop",
  "get_body_profile",
  "get_body_state",
  "list_body_capabilities",
  "query_body",
  "validate_body_action",
  "get_calibration_status",
  "get_runtime_status",
  "request_action",
  "get_action_status",
  "cancel_action",
  "get_product_status",
  "list_product_demos",
  "run_product_demo",
  "get_execution_receipt",
  "explain_execution",
]

[mcp_servers.rosclaw.env]
ROSCLAW_AGENT_CLIENT = "codex"
ROSCLAW_MCP_AUDIT = "1"

# ROSCLAW-MANAGED-END
