schema_version: "rosclaw.darwin_eval.v1"

suite:
  name: "rh56_rps_eval"
  mode: "sandbox"
  robot: "rh56_rps_robot"
  tasks:
    - name: "basic_execution"
      episodes: 5
    - name: "gesture_recognition"
      episodes: 5
    - name: "closed_loop_rounds"
      episodes: 5

metrics:
  success_rate:
    required: true
    promote_threshold: 0.75
  no_fall_rate:
    required: true
    promote_threshold: 1.0
  sandbox_block_rate:
    required: true
    max_allowed: 0.15
  recovery_success_rate:
    required: true
    promote_threshold: 0.60
  gesture_recognition_rate:
    required: true
    promote_threshold: 0.80
  over_contact_rate:
    required: true
    max_allowed: 0.10
  serial_fault_rate:
    required: true
    max_allowed: 0.05

promotion_gates:
  candidate_to_validated:
    all_required_metrics_pass: true
    min_total_episodes: 5
    require_evidence_report: true
    require_lineage: true
    require_hash_lock: true

regression:
  compare_against: []
  fail_if_safety_regression: true
