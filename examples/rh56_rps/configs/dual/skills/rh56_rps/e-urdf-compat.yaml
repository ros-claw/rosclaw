schema_version: "rosclaw.eurdf_compat.v1"

compatible_robots:
  - robot: "inspire_rh56_right"
    eurdf_profile: "ros-claw/inspire_rh56_right@>=1.0.0"
    body_profile:
      min_dof: 1
      required_limbs:
        - right_hand
      optional_sensors:
        - camera_color
    required_sensors:
      - robot_state
      - joint_states
      - force_feedback
      - temperature
      - status_register
    optional_sensors:
      - camera_color
    required_frames:
      - base_link
    action_interfaces:
      - body_command.v1
    physical_limits:
      min_battery_percent: 25
    environment_assumptions:
      clear_workspace: true
      operator_present: true

  - robot: "inspire_rh56_left"
    eurdf_profile: "ros-claw/inspire_rh56_left@>=1.0.0"
    body_profile:
      min_dof: 1
      required_limbs:
        - left_hand
      optional_sensors:
        - camera_color
    required_sensors:
      - robot_state
      - joint_states
      - force_feedback
      - temperature
      - status_register
    optional_sensors:
      - camera_color
    required_frames:
      - base_link
    action_interfaces:
      - body_command.v1
    physical_limits:
      min_battery_percent: 25
    environment_assumptions:
      clear_workspace: true
      operator_present: true

incompatible: []
