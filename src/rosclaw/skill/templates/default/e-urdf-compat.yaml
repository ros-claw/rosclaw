schema_version: "rosclaw.eurdf_compat.v1"

compatible_robots:
  - robot: "{robot}"
    eurdf_profile: "{namespace}/{robot}@>=1.0.0"
    body_profile:
      min_dof: 1
      required_limbs: []
      required_sensors:
        - robot_state
      optional_sensors: []
    required_frames:
      - base_link
    action_interfaces:
      - body_command.v1
    physical_limits:
      min_battery_percent: 25
    environment_assumptions: {}

incompatible: []
